name: Run Python Bot 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # Kay-redemarri l-bot automatic kola 5 d l-swaye3 (hit l-max dyal GitHub VM hiya 6h)
    - cron: '0 */5 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Tqder tbeddel l-version 3.11 aw 3.12 ila bghiti

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Ila 3ndek requirements.txt khdem b had l-amr:
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Aw installi direct l-libraries li khtajiti (Mital: discord.py aw telebot)
        # pip install pyTelegramBotAPI discord.py requests

    - name: Run Bot (Anti-Crash Loop)
      env:
        # Hna katzid l-tokens w l-asrar dyalk b amane (f GitHub Settings -> Secrets and variables -> Actions)
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        # Had l-loop tخليه dima khdam: ila tfa l-bot l-chi sabab, kay-redemarra f 5 d l-thaniyat
        while true; do
          echo "Starting Python Bot..."
          python main.py || true  # Beddel 'main.py' b smiya d l-fayl d l-bot dyalk
          echo "Bot stopped or crashed. Restarting in 5 seconds..."
          sleep 5
        done
